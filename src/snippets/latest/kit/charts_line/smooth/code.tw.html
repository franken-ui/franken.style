<div class="uk-chart-container max-w-md">
  <div class="p-4">
    <div class="uk-card-title">Line Chart - Smooth</div>
    <div class="uk-text-small mt-2">January - June 2024</div>
  </div>

  <div class="px-4">
    <uk-chart>
      <script data-fn="config" type="application/json">
        {
          "apexCharts": {
            "series": [
              {
                "name": "Desktops",
                "data": [186, 305, 237, 73, 209, 214]
              }
            ],
            "chart": {
              "type": "line",
              "zoom": {
                "enabled": false
              },
              "toolbar": {
                "show": false
              }
            },
            "dataLabels": {
              "enabled": false
            },
            "stroke": {
              "curve": "smooth",
              "width": 2
            },
            "colors": ["var(--uk-chart-1)"],
            "grid": {
              "row": {
                "colors": []
              },
              "borderColor": "color-mix( in srgb, var(--uk-border) var(--uk-border-o), transparent)"
            },
            "xaxis": {
              "categories": ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
              "tooltip": {
                "enabled": false
              },
              "labels": {
                "style": {
                  "colors": "var(--uk-muted-f)"
                }
              },
              "axisBorder": {
                "show": false
              },
              "axisTicks": {
                "show": false
              }
            },
            "yaxis": {
              "labels": {
                "show": false
              }
            },
            "tooltip": {
              "title": {
                "show": false
              }
            }
          }
        }
      </script>
    </uk-chart>
  </div>

  <div class="p-4">
    <div class="flex items-center gap-x-2 font-medium leading-none">
      Trending up by 5.2% this month
      <uk-icon icon="trending-up"></uk-icon>
    </div>
    <div class="text-muted-foreground mt-2 leading-none">
      Showing total visitors for the last 6 months
    </div>
  </div>
</div>
