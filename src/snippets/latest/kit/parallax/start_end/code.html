<div
  id="test-start-end"

>

    <div>
      <div

        style="--bg: #fff; --p: 4; --color: #000"
      >
        0 / 0
      </div>
    </div>
    <div>
      <div

        data-uk-parallax="target: #test-start-end; start: 100%; end: 100%; y: 398; easing: 0;"

      <div
        class="bg p color"
        data-uk-parallax="target: #test-start-end; start: 100% + 100; end: 100% + 100; y: 398; easing: 0;"
