<!-- Value-driven utilities -->
<div class="p sm:p md:p" style="--p: 4; --sm-p: 6; --md-p: 8">
  Fully responsive padding
</div>

<!-- Add hover and focus states with the data-fs attribute -->
<button
  type="button"
  class="color linear linear-to-br from to linear-to-bl:hover ring-w:focus outline-none:focus ring:focus dark:ring:focus font-medium rounded-full text-sm px py text-center leading"
  style="
    --color: var(--color-white);
    --from: var(--color-purple-600);
    --to: var(--color-blue-500);
    --ring-w-focus: 4px;
    --ring-focus: var(--color-blue-300);
    --dark-ring-focus: var(--color-blue-800);
    --px: 4;
    --py: 2.5;
    --leading: 5;
  "
  data-fs
>
  Purple to Blue
</button>
