<style>
  :root {
    --ft-cell-border-color: var(--color-neutral-300);
    --ft-cell-fill-color: var(--color-neutral-100);
    --ft-cell-shadow-color: var(--color-neutral-500);
  }

  .dark {
    --ft-cell-border-color: var(--color-neutral-700);
    --ft-cell-fill-color: var(--color-neutral-900);
    --ft-cell-shadow-color: var(--color-neutral-800);
  }

  .dark .ft-cell {
    box-shadow: inset 0px 0px 40px 1px var(--ft-cell-shadow-color);
  }

  .ft-cell:hover {
    opacity: 0.8;
  }

  @keyframes ft-cell-ripple {
    0% {
      opacity: 0.4;
    }
    50% {
      opacity: 0.8;
    }
    100% {
      opacity: 0.4;
    }
  }
</style>

<div

  <div class="mt w-full" style="--mt: 60">
    <h2
      class="z color dark:color relative mx-auto max-w-4xl text-center text-2xl font-bold md:text-4xl lg:text-7xl"
      style="
        --z: 10;
        --color: var(--color-neutral-800);
        --dark-color: var(--color-neutral-100);
      "
    >
      Interactive Background Boxes Ripple Effect
    </h2>
    <p
      class="z mt color dark:color relative mx-auto max-w-xl text-center"
      style="
        --z: 10;
        --mt: 4;
        --color: var(--color-neutral-800);
        --dark-color: var(--color-neutral-500);
      "
    >
      Hover over the boxes above and click.To be used on backgrounds of hero

      everywhere.
    </p>
  </div>
</div>
